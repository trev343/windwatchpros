<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind Watch Pro — Onboarding</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }

  #chat-container {
    background: #111318;
    border: 1px solid rgba(47, 196, 240, 0.15);
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(47, 196, 240, 0.07), 0 4px 32px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 620px;
  }

  #chat-header {
    background: #0d0d0d;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(47, 196, 240, 0.12);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #status-dot {
    width: 8px; height: 8px;
    background: #2fc4f0;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px #2fc4f0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #0d1117;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(47,196,240,0.2); border-radius: 4px; }

  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }

  .msg.agent .avatar { background: rgba(47,196,240,0.15); color: #2fc4f0; border: 1px solid rgba(47,196,240,0.3); }
  .msg.user .avatar { background: rgba(255,255,255,0.07); color: #aaa; border: 1px solid rgba(255,255,255,0.1); }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.55;
    border-radius: 16px;
  }

  .msg.agent .bubble {
    background: #1a1f2e;
    color: #e2e8f0;
    border-radius: 4px 16px 16px 16px;
    border: 1px solid rgba(47,196,240,0.1);
  }

  .msg.user .bubble {
    background: rgba(47,196,240,0.12);
    color: #e2e8f0;
    border-radius: 16px 4px 16px 16px;
    border: 1px solid rgba(47,196,240,0.2);
  }

  .typing-bubble {
    background: #1a1f2e;
    border: 1px solid rgba(47,196,240,0.1);
    border-radius: 4px 16px 16px 16px;
    padding: 12px 16px;
    display: flex; gap: 5px; align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    background: #2fc4f0;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  #input-area {
    padding: 14px 16px;
    background: #0d0d0d;
    border-top: 1px solid rgba(47,196,240,0.12);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    border: 1px solid rgba(47,196,240,0.2);
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.4;
    color: #e2e8f0;
    transition: border-color 0.15s;
    background: #1a1f2e;
  }

  #user-input:focus { border-color: #2fc4f0; box-shadow: 0 0 0 3px rgba(47,196,240,0.08); }
  #user-input::placeholder { color: #4a5568; }

  #send-btn {
    width: 40px; height: 40px;
    background: #2fc4f0;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  }

  #send-btn:hover { background: #5dd3f5; box-shadow: 0 0 12px rgba(47,196,240,0.4); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: #1a2535; cursor: not-allowed; box-shadow: none; }

  #send-btn svg { width: 18px; height: 18px; fill: #0d0d0d; }

  .success-msg {
    background: rgba(47,196,240,0.08);
    border: 1px solid rgba(47,196,240,0.25);
    color: #2fc4f0;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    margin: 4px 0;
  }
</style>
</head>
<body>

<div id="chat-container">
  <div id="chat-header">
    <div style="display:flex; align-items:center; justify-content:space-between; width:100%;">
      <div style="height:36px; display:flex; align-items:center;">
        <svg viewBox="0 0 680 160" height="36" xmlns="http://www.w3.org/2000/svg">
          <path d="M100 45 L138 57 L138 110 Q138 138 100 152 Q62 138 62 110 L62 57 Z" fill="#162e45" stroke="#2fc4f0" stroke-width="2"/>
          <path d="M100 56 L130 66 L130 109 Q130 133 100 145 Q70 133 70 109 L70 66 Z" fill="#0e2035"/>
          <path d="M82 115 Q100 103 118 115" fill="none" stroke="#2fc4f0" stroke-width="2.8" stroke-linecap="round"/>
          <path d="M86 101 Q100 91 114 101" fill="none" stroke="#2fc4f0" stroke-width="2.8" stroke-linecap="round" opacity="0.8"/>
          <path d="M90 88 Q100 80 110 88" fill="none" stroke="#2fc4f0" stroke-width="2.8" stroke-linecap="round" opacity="0.55"/>
          <circle cx="100" cy="115" r="4.5" fill="#2fc4f0"/>
          <circle cx="100" cy="115" r="2" fill="#0d0d0d"/>
          <text x="158" y="103" font-family="Arial,sans-serif" font-size="36" font-weight="500" fill="#ffffff" letter-spacing="3">WIND WATCH</text>
          <text x="160" y="125" font-family="Arial,sans-serif" font-size="13" font-weight="400" fill="#2fc4f0" letter-spacing="7">P R O</text>
        </svg>
      </div>
      <div id="status-dot"></div>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are a friendly onboarding assistant for Wind Watch Pro — a real-time wind gust alert service that protects commercial tents. Your job is to collect the following information in a warm, conversational way:

1. Company name (e.g. "Seaside Party Rentals")
2. Zip code to monitor
3. Wind threshold in MPH — the speed at which they want to be alerted (suggest 25 MPH if unsure)
4. Manager phone number — format with +1 country code (e.g. +12109136075)
5. Owner phone number — format with +1 country code (may be same as manager)

Ask for 1-2 pieces at a time. Be concise and friendly. Always format phone numbers with +1 prefix before saving.

Once you have ALL 5 pieces of info, briefly confirm the details with the customer. Then call the save_customer tool to save their record. After saving successfully, thank them and let them know Wind Watch Pro will start monitoring their zip code immediately. You can also mention that when a wind alert text arrives, tapping the link in it confirms the alert and pauses notifications for 8 hours.

Keep responses under 3 sentences. No markdown or bullet points in your replies.`;

let history = [];
let saving = false;

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const initials = role === 'user' ? 'You' : 'W';
  wrap.innerHTML = `
    <div class="avatar">${initials}</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg agent';
  wrap.id = 'typing';
  wrap.innerHTML = `<div class="avatar">W</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setInputDisabled(disabled) {
  document.getElementById('user-input').disabled = disabled;
  document.getElementById('send-btn').disabled = disabled;
}

async function saveToAirtable(customerData) {
  try {
    const resp = await fetch("https://api.airtable.com/v0/appuT8I6375ZPeNh1/Companies", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer patiElRIOdXymGrEp.2389e3359921f6c178290518748148a105141a4b566e71759f178bdf8c9eb730"
      },
      body: JSON.stringify({
        records: [{
          fields: {
            "Company Name": customerData.company_name,
            "Zip Code": customerData.zip_code,
            "Wind Threshold (mph)": customerData.wind_threshold_mph,
            "Manager Phone": customerData.manager_phone,
            "Owner Phone": customerData.owner_phone,
            "Alert Status": "None",
            "Active": true
          }
        }]
      })
    });
    const data = await resp.json();
    if (resp.ok) return { success: true };
    return { success: false, error: JSON.stringify(data) };
  } catch(err) {
    return { success: false, error: err.message };
  }
}

async function callClaude(userMessage) {
  if (userMessage) history.push({ role: "user", content: userMessage });

  const tools = [{
    name: "save_customer",
    description: "Save a confirmed customer record to Airtable after collecting all required info",
    input_schema: {
      type: "object",
      properties: {
        company_name: { type: "string" },
        zip_code: { type: "string" },
        wind_threshold_mph: { type: "number" },
        manager_phone: { type: "string" },
        owner_phone: { type: "string" }
      },
      required: ["company_name","zip_code","wind_threshold_mph","manager_phone","owner_phone"]
    }
  }];

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000);

  const resp = await fetch("/.netlify/functions/claude-proxy", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    signal: controller.signal,
    body: JSON.stringify({
      model: "claude-sonnet-4-5",
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      tools,
      messages: history
    })
  });
  clearTimeout(timeout);

  const data = await resp.json();
  const toolUse = data.content.find(b => b.type === "tool_use");
  const textBlock = data.content.find(b => b.type === "text");

  if (toolUse && toolUse.name === "save_customer") {
    history.push({ role: "assistant", content: data.content });
    if (textBlock) addMessage('agent', textBlock.text);

    removeTyping();
    showTyping();

    const result = await saveToAirtable(toolUse.input);

    history.push({
      role: "user",
      content: [{
        type: "tool_result",
        tool_use_id: toolUse.id,
        content: result.success ? "Record saved successfully to Airtable." : "Error: " + result.error
      }]
    });

    const controller2 = new AbortController();
    const timeout2 = setTimeout(() => controller2.abort(), 15000);
    const followResp = await fetch("/.netlify/functions/claude-proxy", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: controller2.signal,
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 500,
        system: SYSTEM_PROMPT,
        tools,
        messages: history
      })
    });
    clearTimeout(timeout2);

    const followData = await followResp.json();
    history.push({ role: "assistant", content: followData.content });
    const finalText = followData.content.find(b => b.type === "text");
    removeTyping();
    if (finalText) addMessage('agent', finalText.text);

  } else {
    history.push({ role: "assistant", content: data.content });
    removeTyping();
    if (textBlock) addMessage('agent', textBlock.text);
  }
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || saving) return;

  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  setInputDisabled(true);
  showTyping();

  try {
    await callClaude(text);
  } catch(err) {
    removeTyping();
    addMessage('agent', "Sorry, something went wrong. Please try again.");
  }

  setInputDisabled(false);
  input.focus();
}

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

async function init() {
  showTyping();
  try {
    await callClaude("Hello, I just signed up for Wind Watch Pro and I'm ready to set up my first event.");
  } catch(e) {
    removeTyping();
    addMessage('agent', "Hey, welcome to Wind Watch Pro! I'm here to get your first event set up. What's your full name?");
  }
}

init();
</script>
</body>
</html>
