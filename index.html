<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wind Watch Pro — Onboarding</title>
<style>
  :root {
    --bg: #080e14;
    --panel: #0d1f2e;
    --bubble-agent: #122c3f;
    --bubble-user: #0d9fc4;
    --teal: #2fc4f0;
    --teal-deep: #0d9fc4;
    --text: #ffffff;
    --text-dim: #8fb3c4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Inter', Arial, Helvetica, sans-serif;
    color: var(--text);
  }

  .chat-shell {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 520px;
    margin: 0 auto;
    background: var(--bg);
  }

  /* Header */
  .chat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(47, 196, 240, 0.12);
  }

  .chat-header .mark {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .chat-header .wordmark {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    line-height: 1.3;
  }

  .chat-header .wordmark span {
    display: block;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.55em;
    color: var(--teal);
  }

  .status-dot {
    margin-left: auto;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .row.user { flex-direction: row-reverse; }

  .avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--panel);
    color: var(--teal);
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .row.user .avatar {
    background: #16384d;
    color: var(--text-dim);
    font-size: 9px;
  }

  .bubble {
    max-width: 78%;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .row.agent .bubble {
    background: var(--bubble-agent);
    border-bottom-left-radius: 4px;
  }

  .row.user .bubble {
    background: var(--bubble-user);
    color: #04141d;
    font-weight: 500;
    border-bottom-right-radius: 4px;
  }

  .row.error .bubble {
    background: #3a1722;
    color: #ffb3c0;
    border-bottom-left-radius: 4px;
  }

  /* Typing indicator */
  .typing .bubble {
    display: flex;
    gap: 5px;
    padding: 14px 16px;
  }

  .typing .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: pulse 1.2s infinite ease-in-out;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.15s; }
  .typing .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  @media (prefers-reduced-motion: reduce) {
    .typing .dot { animation: none; opacity: 0.6; }
    .messages { scroll-behavior: auto; }
  }

  /* Composer */
  .composer {
    display: flex;
    gap: 10px;
    padding: 14px 16px 18px;
  }

  .composer input {
    flex: 1;
    background: var(--panel);
    border: 1px solid rgba(47, 196, 240, 0.35);
    border-radius: 22px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .composer input::placeholder { color: var(--text-dim); }

  .composer input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 2px rgba(47, 196, 240, 0.15);
  }

  .composer button {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    background: var(--teal);
    color: #04141d;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.1s, opacity 0.15s;
  }

  .composer button:hover:not(:disabled) { transform: scale(1.06); }
  .composer button:disabled { opacity: 0.4; cursor: default; }
  .composer button:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  .composer button svg { width: 18px; height: 18px; }
</style>
</head>
<body>
  <div class="chat-shell">
    <header class="chat-header">
      <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <path d="M16 2 L28 7 V15 C28 23 22.5 28.5 16 30 C9.5 28.5 4 23 4 15 V7 Z"
              stroke="#2fc4f0" stroke-width="1.6" fill="none"/>
        <path d="M9.5 14 Q16 9.5 22.5 14" stroke="#2fc4f0" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M11 17.5 Q16 13.8 21 17.5" stroke="#2fc4f0" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.7"/>
        <circle cx="16" cy="21" r="1.6" fill="#2fc4f0"/>
      </svg>
      <div class="wordmark">WIND WATCH<span>P R O</span></div>
      <div class="status-dot" title="Online"></div>
    </header>

    <main class="messages" id="messages" aria-live="polite"></main>

    <form class="composer" id="composer">
      <input
        type="text"
        id="input"
        placeholder="Type a message..."
        autocomplete="off"
        aria-label="Type a message"
      />
      <button type="submit" id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M2.5 21 23 12 2.5 3 2.5 10 17 12 2.5 14Z"/>
        </svg>
      </button>
    </form>
  </div>

<script>
  // ====== CONFIG ======
  // Same-origin call to the Netlify function in this project.
  const PROXY_URL = "/.netlify/functions/claude-proxy";

  const GREETING =
    "Hey, welcome to Wind Watch Pro! I'm here to get your account set up. What's your company name?";

  // ====== STATE ======
  // Full conversation history sent to the proxy on every turn.
  const history = [];
  let busy = false;
  let completed = false;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const composerEl = document.getElementById("composer");

  // ====== UI HELPERS ======
  function addBubble(role, text) {
    const row = document.createElement("div");
    row.className = "row " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "You" : "W";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function addTyping() {
    const row = document.createElement("div");
    row.className = "row agent typing";
    row.innerHTML =
      '<div class="avatar">W</div>' +
      '<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function setBusy(state) {
    busy = state;
    sendBtn.disabled = state || completed;
    inputEl.disabled = state || completed;
    if (!state && !completed) inputEl.focus();
  }

  // ====== CHAT FLOW ======
  async function sendMessage(text) {
    addBubble("user", text);
    history.push({ role: "user", content: text });

    setBusy(true);
    const typingRow = addTyping();

    try {
      const res = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });

      typingRow.remove();

      if (!res.ok) {
        let detail = "";
        try {
          const errBody = await res.json();
          detail = errBody.error ? " (" + errBody.error + ")" : "";
        } catch (_) {}
        addBubble("error", "Sorry, something went wrong" + detail + ". Please try again.");
        history.pop(); // let them resend the same message
        return;
      }

      const data = await res.json();
      const reply = data.reply || "Sorry, I didn't catch that — could you try again?";

      addBubble("agent", reply);
      history.push({ role: "assistant", content: reply });

      if (data.completed) {
        completed = true;
        inputEl.placeholder = "Onboarding complete";
        sendBtn.disabled = true;
        inputEl.disabled = true;
      }
    } catch (err) {
      typingRow.remove();
      addBubble("error", "Connection problem — please check your internet and try again.");
      history.pop();
    } finally {
      setBusy(false);
    }
  }

  composerEl.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text || busy || completed) return;
    inputEl.value = "";
    sendMessage(text);
  });

  // ====== INIT ======
  addBubble("agent", GREETING);
  history.push({ role: "assistant", content: GREETING });
  inputEl.focus();
</script>
</body>
</html>
