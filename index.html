<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind Watch Pro — Customer Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }

  #chat-container {
    background: #111318;
    border: 1px solid rgba(47, 196, 240, 0.15);
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(47, 196, 240, 0.07), 0 4px 32px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 620px;
  }

  #chat-header {
    background: #0d0d0d;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(47, 196, 240, 0.12);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #status-dot {
    width: 8px; height: 8px;
    background: #2fc4f0;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px #2fc4f0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #0d1117;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(47,196,240,0.2); border-radius: 4px; }

  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600
